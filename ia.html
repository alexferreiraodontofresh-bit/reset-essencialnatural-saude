<script>

let conversationHistory = [];
let isLoading = false;

function addMessage(role, content, isHTML = false){

const msgs = document.getElementById('messages');

const div = document.createElement('div');
div.className = `msg ${role}`;

const avatar = document.createElement('div');
avatar.className = 'msg-avatar';
avatar.textContent = role === 'bot' ? '🌿' : '👤';

const bubble = document.createElement('div');
bubble.className = 'msg-bubble';

if(isHTML){
bubble.innerHTML = content;
}else{
bubble.textContent = content;
}

div.appendChild(avatar);
div.appendChild(bubble);

msgs.appendChild(div);

msgs.scrollTop = msgs.scrollHeight;

return div;

}

function showTyping(){

const msgs = document.getElementById('messages');

const div = document.createElement('div');

div.className = 'msg bot';
div.id = 'typing-indicator';

div.innerHTML = `
<div class="msg-avatar">🌿</div>
<div class="msg-bubble typing">
<div class="typing-dot"></div>
<div class="typing-dot"></div>
<div class="typing-dot"></div>
</div>
`;

msgs.appendChild(div);

msgs.scrollTop = msgs.scrollHeight;

}

function removeTyping(){

const t = document.getElementById('typing-indicator');

if(t) t.remove();

}

function callAI(userMessage){

const resposta = responderIA(userMessage);

return Promise.resolve(resposta);

}

function formatReply(text){

return text
.replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>')
.replace(/\n\n/g,'<br><br>')
.replace(/\n/g,'<br>');

}

async function sendMessage(){

const input = document.getElementById('chat-input');

const text = input.value.trim();

if(!text || isLoading) return;

isLoading = true;

input.value = '';

input.style.height = 'auto';

document.getElementById('send-btn').disabled = true;

addMessage('user', text);

showTyping();

try{

const reply = await callAI(text);

removeTyping();

addMessage('bot', formatReply(reply), true);

}catch(err){

removeTyping();

addMessage('bot','Ops! Houve um problema de conexão. Tente novamente.');

}

isLoading = false;

document.getElementById('send-btn').disabled = false;

input.focus();

}

function sendQuick(text){

document.getElementById('chat-input').value = text;

sendMessage();

}

function askKit(kitName){

sendQuick(`Me fale mais sobre o kit ${kitName}. O que está incluído e para quem é indicado?`);

}

function handleKey(e){

if(e.key === 'Enter' && !e.shiftKey){

e.preventDefault();

sendMessage();

}

}

function autoResize(el){

el.style.height = 'auto';
el.style.height = Math.min(el.scrollHeight,120) + 'px';

}

</script>

<script src="ia.js"></script>

</body>
</html>
